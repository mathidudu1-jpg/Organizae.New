name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      # expo-env.d.ts é gerado pelo Expo em dev (gitignored); o typecheck
      # precisa da referência a expo/types (declara módulos .css etc).
      - run: printf '/// <reference types="expo/types" />\n' > expo-env.d.ts
      - run: npx tsc --noEmit
      - run: npx vitest run
